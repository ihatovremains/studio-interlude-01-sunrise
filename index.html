<script>
  const root = document.getElementById("viewer-frame-production-study");
  const captureMode = new URLSearchParams(location.search).has("capture");
  const cameraWorld = root.querySelector("[data-camera-world]");
  const space = root.querySelector("[data-space]");
  const stars = root.querySelector("[data-stars]");
  const sunNote = root.querySelector("[data-sun-note]");
  const groundCity = root.querySelector("[data-ground-city]");
  const night = root.querySelector("[data-night]");
  const day = root.querySelector("[data-day]");
  const terminator = root.querySelector("[data-terminator]");
  const lightLabels = root.querySelector("[data-light-labels]");
  const telemetry = root.querySelector("[data-telemetry]");
  const crossingLabel = root.querySelector("[data-crossing]");
  const graticulePath = root.querySelector("[data-graticule]");
  const spherePath = root.querySelector("[data-sphere]");
  const sphereLine = root.querySelector("[data-sphere-line]");
  const sunRim = root.querySelector("[data-sun-rim]");
  const tokyoDot = root.querySelector("[data-tokyo-dot]");
  const tokyoHalo = root.querySelector("[data-tokyo-halo]");
  const trailPath = root.querySelector("[data-trail]");
  const copyBox = root.querySelector(".vfs-copy");
  const mainCopy = root.querySelector("[data-main-copy]");
  const subCopy = root.querySelector("[data-sub-copy]");
  const replay = root.querySelector("[data-replay]");
  const scrub = root.querySelector("[data-scrub]");
  const timeLabel = root.querySelector("[data-time]");

  const tokyo = [139.6917, 35.6895];
  const duration = 17;
  const audioPlan = Object.freeze([
    Object.freeze({ kind: "dawn-bed", time: 0, duration: 3.2 }),
    Object.freeze({ kind: "pullback-air", time: 3, duration: 4.75 }),
    Object.freeze({ kind: "system-bed", time: 7.75, duration: 8.6 }),
    Object.freeze({ kind: "rotational-pulse", time: 7.88, duration: 1.65, frequencies: [110, 220] }),
    Object.freeze({ kind: "boundary-harmonic", time: 11.5, duration: .65, frequencies: [164.81, 247.22] }),
    Object.freeze({ kind: "closing-bed", time: 13.2, duration: 3.15 }),
    Object.freeze({ kind: "master-fade", time: 16.35, duration: .65 })
  ]);
  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const radians = Math.PI / 180;
  const sphereD = "M0,-254A254,254 0 1,1 0,254A254,254 0 1,1 0,-254Z";

  let frameId = 0;
  let startAt = 0;
  let running = false;
  let currentTime = 0;

  function clamp(value, min = 0, max = 1) {
    return Math.max(min, Math.min(max, value));
  }

  function mix(a, b, p) {
    return a + (b - a) * p;
  }

  function smooth(value) {
    const p = clamp(value);
    return p * p * (3 - 2 * p);
  }

  function projectPoint(coordinates, rotation) {
    const longitude = (coordinates[0] + rotation.yaw) * radians;
    const latitude = coordinates[1] * radians;
    const pitch = rotation.pitch * radians;
    const cosLatitude = Math.cos(latitude);
    const sourceY = -Math.sin(latitude);
    const sourceZ = cosLatitude * Math.cos(longitude);
    const x = 254 * cosLatitude * Math.sin(longitude);
    const y = 254 * (sourceY * Math.cos(pitch) - sourceZ * Math.sin(pitch));
    const z = sourceY * Math.sin(pitch) + sourceZ * Math.cos(pitch);
    return { point: [x, y], visible: z >= 0 };
  }

  function linePath(coordinates, rotation) {
    let output = "";
    let drawing = false;
    for (const coordinate of coordinates) {
      const projected = projectPoint(coordinate, rotation);
      if (!projected.visible) {
        drawing = false;
        continue;
      }
      const [x, y] = projected.point;
      output += `${drawing ? "L" : "M"}${x.toFixed(2)},${y.toFixed(2)}`;
      drawing = true;
    }
    return output;
  }

  function graticuleAt(rotation) {
    const paths = [];
    for (let longitude = -180; longitude < 180; longitude += 15) {
      const points = [];
      for (let latitude = -88; latitude <= 88; latitude += 2) points.push([longitude, latitude]);
      paths.push(linePath(points, rotation));
    }
    for (let latitude = -75; latitude <= 75; latitude += 15) {
      const points = [];
      for (let longitude = -180; longitude <= 180; longitude += 2) points.push([longitude, latitude]);
      paths.push(linePath(points, rotation));
    }
    return paths.join("");
  }

  function dotPath(point, radius = 7) {
    const [x, y] = point;
    return `M${x.toFixed(2)},${y.toFixed(2)}m0,${radius}a${radius},${radius} 0 1,1 0,-${radius * 2}a${radius},${radius} 0 1,1 0,${radius * 2}z`;
  }

  function pullAt(t) {
    return smooth((t - 3) / 4.75);
  }

  function cameraAt(t) {
    const pull = pullAt(t);
    const verticalPull = smooth((t - 4.1) / 3.65);
    const groundLift = smooth(t / 3.2) * 26;
    return {
      x: mix(400, 292, pull),
      y: mix(2174 + groundLift, 470, verticalPull),
      scale: mix(6.97, .96, pull),
      pull
    };
  }

  function rotationAt(t) {
    const pull = pullAt(t);
    let yaw = mix(-139.6917, -185, pull);
    if (t >= 8.05 && t <= 11.5) {
      yaw = mix(-185, -139.6917, clamp((t - 8.05) / 3.45));
    } else if (t > 11.5 && t < 12.5) {
      yaw = mix(-139.6917, -126.56, clamp((t - 11.5) / 1));
    } else if (t >= 12.5) {
      yaw = mix(-126.56, -122.5, smooth((t - 12.5) / .8));
    }
    return {
      yaw,
      pitch: mix(54.3105, -8, pull)
    };
  }

  function copyAt(t) {
    if (t < 2.25) return ["The Sun rises.", "HUMAN VIEW · TOKYO"];
    if (t < 3.55) return ["From here, that is true.", "HUMAN VIEW"];
    if (t < 7.75) return ["", ""];
    if (t < 10.5) return ["Tokyo rotates into daylight.", "SYSTEM VIEW · CAUSE · TIME COMPRESSED"];
    if (t < 13.2) return ["Same event. Different frame.", "≈ 1,350 KM/H EASTWARD · TIME COMPRESSED"];
    return ["Every interface chooses where the viewer stands.", ""];
  }

  function projectedTokyo(t) {
    const rotation = rotationAt(t);
    return projectPoint(tokyo, rotation);
  }

  function trailAt(t) {
    if (t < 10.7 || t >= 13.2) return "";
    const points = [];
    const from = Math.max(10.7, t - 1.5);
    for (let sample = from; sample <= t + .001; sample += .1) {
      const state = projectedTokyo(sample);
      if (state.visible) points.push(state.point);
    }
    if (points.length < 2) return "";
    return points.map((point, index) => `${index ? "L" : "M"}${point[0].toFixed(1)},${point[1].toFixed(1)}`).join(" ");
  }

  function copyOpacityAt(t) {
    const windows = [
      [0, 2.25],
      [2.25, 3.55],
      [7.75, 10.5],
      [10.5, 13.2],
      [13.2, duration]
    ];
    const active = windows.find(([start, end]) => t >= start && t <= end);
    if (!active) return 0;
    const [start, end] = active;
    const fadeIn = clamp((t - start) / .3);
    const fadeOut = end === duration ? 1 : clamp((end - t) / .26);
    return Math.min(fadeIn, fadeOut);
  }

  function render(value) {
    const t = Math.max(0, Math.min(duration, value));
    currentTime = t;
    const camera = cameraAt(t);
    const rotation = rotationAt(t);
    cameraWorld.setAttribute("transform", `translate(${camera.x.toFixed(2)} ${camera.y.toFixed(2)}) scale(${camera.scale.toFixed(4)})`);
    spherePath.setAttribute("d", sphereD);
    sphereLine.setAttribute("d", sphereD);
    graticulePath.setAttribute("d", graticuleAt(rotation));
    graticulePath.style.opacity = String(clamp((camera.pull - .58) / .42));

    const projected = projectPoint(tokyo, rotation);
    const point = projected.point;
    const visible = projected.visible;
    const tokyoPath = visible ? dotPath(point) : "";
    const cityOpacity = clamp((camera.pull - .06) / .46);
    const isDay = visible && point[0] >= 0;
    const crossing = visible && Math.abs(point[0]) < 19 && t > 10.5;

    tokyoDot.setAttribute("d", tokyoPath);
    tokyoDot.setAttribute("class", `vfs-tokyo-dot ${isDay ? "is-day" : ""}`);
    tokyoDot.style.opacity = visible ? String(cityOpacity) : "0";
    tokyoHalo.setAttribute("cx", point ? String(point[0]) : "0");
    tokyoHalo.setAttribute("cy", point ? String(point[1]) : "0");
    tokyoHalo.setAttribute("class", `vfs-tokyo-halo ${crossing ? "is-crossing" : ""}`);
    trailPath.setAttribute("d", trailAt(t));
    if (point) {
      const screenX = camera.x + point[0] * camera.scale;
      const screenY = camera.y + point[1] * camera.scale;
      crossingLabel.setAttribute("transform", `translate(${screenX.toFixed(2)} ${screenY.toFixed(2)})`);
    }

    groundCity.style.opacity = String(1 - clamp(camera.pull / .55));
    space.style.opacity = String(.78 * camera.pull);
    stars.style.opacity = String(.42 * clamp((camera.pull - .35) / .65));
    night.style.opacity = String(.5 * clamp((camera.pull - .42) / .58));
    day.style.opacity = String(.98 * clamp((camera.pull - .42) / .58));
    terminator.style.opacity = String(.9 * clamp((camera.pull - .62) / .38));
    sunRim.style.opacity = String(.86 * clamp((camera.pull - .5) / .5));
    lightLabels.style.opacity = String(clamp((t - 7.75) / .45) * clamp((13.25 - t) / .65));
    sunNote.style.opacity = String(t >= 3.55 && t < 7.8 ? clamp((t - 3.55) / .45) * clamp((7.8 - t) / .45) : 0);
    telemetry.style.opacity = String(clamp((t - 7.75) / .5) * clamp((13.2 - t) / .7));
    crossingLabel.style.opacity = String(crossing ? 1 : 0);

    const [headline, subline] = copyAt(t);
    mainCopy.textContent = headline;
    subCopy.textContent = subline;
    copyBox.style.opacity = String(copyOpacityAt(t));
    scrub.value = String(t);
    timeLabel.textContent = `${t.toFixed(1)} s`;
  }

  function tick(now) {
    if (!running) return;
    const elapsed = (now - startAt) / 1000;
    render(elapsed);
    if (elapsed < duration) frameId = requestAnimationFrame(tick);
    else {
      running = false;
      replay.textContent = "Replay 17 seconds";
    }
  }

  function play() {
    cancelAnimationFrame(frameId);
    running = true;
    startAt = performance.now();
    replay.textContent = "Restart";
    render(0);
    frameId = requestAnimationFrame(tick);
  }

  function renderAt(seconds) {
    cancelAnimationFrame(frameId);
    running = false;
    render(seconds);
    replay.textContent = "Replay 17 seconds";
    return state();
  }

  function stop() {
    cancelAnimationFrame(frameId);
    running = false;
    replay.textContent = currentTime >= duration ? "Replay 17 seconds" : "Resume";
    return state();
  }

  function state() {
    return {
      time: currentTime,
      duration,
      cameraTransform: cameraWorld.getAttribute("transform"),
      sun: { x: 705, y: 456 },
      tokyoDaylight: tokyoDot.classList.contains("is-day"),
      headline: mainCopy.textContent,
      captureMode
    };
  }

  replay.addEventListener("click", play);
  scrub.addEventListener("input", () => renderAt(Number(scrub.value)));

  document.addEventListener("keydown", (event) => {
    if (event.target instanceof HTMLInputElement || event.target instanceof HTMLButtonElement) return;
    if (event.key.toLowerCase() === "r") play();
    if (event.code === "Space") {
      event.preventDefault();
      if (running) stop();
      else play();
    }
  });

  window.studioInterlude = Object.freeze({
    renderAt,
    duration: () => duration,
    state,
    audioEvents: () => audioPlan.map(event => ({ ...event, frequencies: event.frequencies ? [...event.frequencies] : undefined })),
    play,
    stop,
    replay: play
  });

  if (captureMode) renderAt(0);
  else if (reduceMotion) renderAt(15.5);
  else play();
</script>

</body>
</html>
